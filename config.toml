# PlanGrab configuration.
# Everything here has a sensible default in code; this file just lets you tweak
# behaviour without touching Python.

[naming]
# Filename template. Split on " - "; a segment is dropped whole if any field it
# references is empty (so missing metadata never leaves a dangling " -  - ").
# index/total are zero-padded to the width of total automatically.
# The real file extension is appended automatically — do NOT put .{ext} here.
# Available fields: {index} {total} {title} {plan_number} {date} {doc_type} {doc_id}
template = "{index:03d} of {total:03d} - {title} - {plan_number} - {date}"
# strftime format for {date}. Default renders "01 Jan 2025".
date_format = "%d %b %Y"

[network]
# Be honest and polite. Set a contactable UA if you run this at any scale.
user_agent = "PlanGrab/0.1 (+UK planning document downloader)"
request_delay = 0.7   # seconds between requests
timeout = 60.0        # per-request timeout, seconds
max_retries = 3       # retries on transient (429/5xx/network) errors
# TLS certificates are checked against the OPERATING SYSTEM's certificate store
# (so corporate-proxy CAs installed by IT are trusted automatically). If you
# still get a CERTIFICATE_VERIFY_FAILED / "_ssl.c:…" error on a work network,
# uncomment this as a last resort (it disables certificate checking entirely):
# tls_verify = false

# On startup, quietly fetch the latest council registry from the project repo so
# new councils appear without re-downloading the app. Best-effort: offline or
# blocked networks just keep the shipped data. Set enabled = false to opt out.
[registry_update]
enabled = true
# url = "https://raw.githubusercontent.com/gtlaix/PlanGrab/master/data"

# Per-system User-Agent overrides (system id -> UA). Optional. Some portals sit
# behind a WAF that rejects non-browser UAs; their scraper already sets a sensible
# browser-like default, but you can override it here without touching code. IDOX is
# left to the honest default above.
[user_agents]
# northgate = "Mozilla/5.0 (Windows NT 10.0; Win64; x64) ... Chrome/124.0 Safari/537.36"

# Local helper / hosted-UI settings. PlanGrab's UI can be served from GitHub
# Pages while the actual downloading runs on this machine (so requests keep
# coming from your own IP). The hosted page talks to this local helper over
# http://127.0.0.1 on one of the ports below.
[server]
# Origin of the hosted UI that is allowed to drive this local helper (CORS).
# Keep this tight — only the site you trust should be able to reach the helper.
allowed_origin = "https://gtlaix.github.io"
# Ports the helper tries in order (first free one wins); the hosted page probes
# the same list to find the helper. Override the runtime port with PLANGRAB_PORT.
ports = [8756, 8757, 8758, 8759, 8760]

# Friendly council names by host. Optional — an unknown host on a known system
# still works (it falls back to a humanised hostname). Add a line to label one.
[lpa_registry]
"pa.bristol.gov.uk" = "Bristol City Council"
"developments.southglos.gov.uk" = "South Gloucestershire Council"
"planning.n-somerset.gov.uk" = "North Somerset Council"
